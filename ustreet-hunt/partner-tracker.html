<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>U Street Passport — Partner Tracker</title>
  <meta name="description" content="Internal partner and sponsor tracker for U Street Passport × ATCHÉ × Cookies DC. July 11, 2026.">
  <meta name="author" content="ATCHÉ">
  <meta name="robots" content="noindex, nofollow">
  <meta property="og:title" content="U Street Passport — Partner Tracker">
  <meta property="og:description" content="Track venue partners, prizes, and outreach status for the U Street Passport event.">
  <meta property="og:image" content="https://ustreet-hunt.atcheofficial.com/og-image.png">
  <meta property="og:url" content="https://ustreet-hunt.atcheofficial.com/partner-tracker.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="U Street Passport × ATCHÉ">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Partner Tracker — U Street Passport">
  <meta name="twitter:description" content="Internal CRM for U Street Passport partners and sponsors.">
  <meta name="twitter:image" content="https://ustreet-hunt.atcheofficial.com/og-image.png">
  <meta name="theme-color" content="#04102b">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #04102b; --card: #0a1a3a; --card2: #0d2040;
      --blue: #1a73e8; --blue-bright: #5b9dff;
      --gold: #f0b428; --green: #20c870; --red: #e85050; --orange: #f07828;
      --white: #f4f8ff; --ice: #c2d5f5; --muted: #7a8ab0;
      --line: rgba(255,255,255,.08);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--white); font-family:'Inter',system-ui,sans-serif; min-height:100vh; }

    /* HEADER */
    header {
      background:rgba(4,16,43,.95); backdrop-filter:blur(16px);
      border-bottom:1px solid var(--line); padding:16px 24px;
      display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
      position:sticky; top:0; z-index:100;
    }
    .logo { font-size:14px; font-weight:900; letter-spacing:.1em; text-transform:uppercase; }
    .logo span { color:var(--gold); }
    .header-actions { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .btn { padding:8px 16px; border-radius:8px; font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; border:none; font-family:inherit; transition:all .2s; }
    .btn-gold { background:var(--gold); color:#04102b; }
    .btn-gold:hover { background:#ffd06e; }
    .btn-outline { background:transparent; color:var(--ice); border:1px solid rgba(255,255,255,.15); }
    .btn-outline:hover { border-color:var(--blue-bright); color:var(--blue-bright); }
    .btn-sm { padding:6px 12px; font-size:11px; }

    /* SUMMARY STATS */
    .summary { display:flex; gap:12px; padding:20px 24px 0; flex-wrap:wrap; }
    .sum-card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 20px; min-width:120px; }
    .sum-num { font-size:28px; font-weight:900; line-height:1; }
    .sum-lbl { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-top:3px; }
    .sum-card.green { border-color:rgba(32,200,112,.25); }
    .sum-card.green .sum-num { color:var(--green); }
    .sum-card.gold { border-color:rgba(240,180,40,.25); }
    .sum-card.gold .sum-num { color:var(--gold); }
    .sum-card.blue { border-color:rgba(91,157,255,.25); }
    .sum-card.blue .sum-num { color:var(--blue-bright); }
    .sum-card.red { border-color:rgba(232,80,80,.25); }
    .sum-card.red .sum-num { color:var(--red); }

    /* FILTERS */
    .filters { display:flex; gap:8px; padding:16px 24px; flex-wrap:wrap; align-items:center; }
    .filter-label { font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-right:4px; }
    .filter-btn { padding:6px 14px; border-radius:20px; font-size:11px; font-weight:700; letter-spacing:.06em; cursor:pointer; border:1px solid var(--line); background:transparent; color:var(--muted); font-family:inherit; transition:all .2s; }
    .filter-btn:hover, .filter-btn.active { border-color:var(--blue-bright); color:var(--blue-bright); background:rgba(91,157,255,.08); }
    .filter-btn.active.all { border-color:var(--white); color:var(--white); background:rgba(255,255,255,.05); }
    .search-wrap { margin-left:auto; }
    .search-input { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:7px 14px; color:var(--white); font-size:13px; font-family:inherit; outline:none; width:200px; }
    .search-input::placeholder { color:var(--muted); }
    .search-input:focus { border-color:var(--blue-bright); }

    /* TABLE */
    .table-wrap { padding:0 24px 100px; overflow-x:auto; }
    table { width:100%; border-collapse:collapse; min-width:900px; }
    thead th { padding:10px 14px; font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); text-align:left; border-bottom:2px solid rgba(255,255,255,.12); background:#04102b; position:sticky; top:57px; z-index:20; }
    thead th.sort { cursor:pointer; user-select:none; }
    thead th.sort:hover { color:var(--blue-bright); }
    tbody tr { border-bottom:1px solid var(--line); transition:background .15s; }
    tbody tr:hover { background:rgba(255,255,255,.025); }
    tbody td { padding:12px 14px; font-size:13px; vertical-align:middle; }

    /* STATUS BADGES */
    .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; white-space:nowrap; }
    .badge.confirmed { background:rgba(32,200,112,.15); color:var(--green); border:1px solid rgba(32,200,112,.3); }
    .badge.outreach { background:rgba(240,180,40,.1); color:var(--gold); border:1px solid rgba(240,180,40,.25); }
    .badge.interested { background:rgba(91,157,255,.12); color:var(--blue-bright); border:1px solid rgba(91,157,255,.25); }
    .badge.pending { background:rgba(255,255,255,.05); color:var(--muted); border:1px solid var(--line); }
    .badge.declined { background:rgba(232,80,80,.1); color:var(--red); border:1px solid rgba(232,80,80,.25); }

    .type-badge { display:inline-block; padding:2px 8px; border-radius:6px; font-size:10px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; margin-top:2px; }
    .type-badge.venue { background:rgba(91,157,255,.12); color:var(--blue-bright); }
    .type-badge.food { background:rgba(32,200,112,.1); color:var(--green); }
    .type-badge.cannabis { background:rgba(240,180,40,.1); color:var(--gold); }
    .type-badge.bar { background:rgba(240,120,40,.1); color:var(--orange); }
    .type-badge.sponsor { background:rgba(160,100,240,.15); color:#c08af0; }
    .type-badge.campus { background:rgba(80,200,240,.1); color:#50c8f0; }

    /* PRIZE CHIPS */
    .prize-list { display:flex; flex-wrap:wrap; gap:5px; }
    .prize-chip { background:rgba(255,255,255,.06); border:1px solid var(--line); border-radius:6px; padding:3px 8px; font-size:11px; color:var(--ice); }
    .prize-chip.agreed { background:rgba(32,200,112,.1); border-color:rgba(32,200,112,.3); color:var(--green); }

    /* CONTACT CELL */
    .contact-name { font-weight:700; color:var(--white); }
    .contact-role { font-size:11px; color:var(--muted); }
    .contact-links { display:flex; gap:8px; margin-top:5px; }
    .contact-links a { font-size:11px; color:var(--blue-bright); text-decoration:none; padding:2px 8px; border:1px solid rgba(91,157,255,.25); border-radius:5px; }
    .contact-links a:hover { background:rgba(91,157,255,.12); }

    /* NOTES */
    .note-text { font-size:12px; color:var(--muted); max-width:200px; line-height:1.5; }

    /* ACTION BUTTONS */
    .action-row { display:flex; gap:6px; }
    .action-btn { padding:4px 10px; border-radius:6px; font-size:10px; font-weight:700; cursor:pointer; border:1px solid var(--line); background:transparent; color:var(--muted); font-family:inherit; transition:all .2s; letter-spacing:.06em; text-transform:uppercase; }
    .action-btn:hover { border-color:var(--blue-bright); color:var(--blue-bright); background:rgba(91,157,255,.06); }
    .action-btn.danger:hover { border-color:var(--red); color:var(--red); }

    /* ADD ROW / EMPTY */
    .add-row-btn { display:block; width:100%; padding:14px; border:1px dashed rgba(255,255,255,.1); border-radius:10px; background:transparent; color:var(--muted); font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .2s; margin-top:12px; text-align:center; }
    .add-row-btn:hover { border-color:var(--blue-bright); color:var(--blue-bright); }
    .empty { text-align:center; padding:48px 24px; color:var(--muted); font-size:14px; }

    /* MODAL */
    .modal-bg { display:none; position:fixed; inset:0; background:rgba(4,16,43,.88); backdrop-filter:blur(8px); z-index:200; align-items:center; justify-content:center; padding:20px; }
    .modal-bg.open { display:flex; }
    .modal { background:var(--card); border:1px solid rgba(255,255,255,.12); border-radius:20px; padding:32px; width:100%; max-width:600px; max-height:90vh; overflow-y:auto; }
    .modal h2 { font-size:20px; font-weight:900; margin-bottom:24px; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    @media(max-width:500px){ .form-grid{grid-template-columns:1fr;} }
    .form-group { display:flex; flex-direction:column; gap:6px; }
    .form-group.full { grid-column:1/-1; }
    label { font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
    input, select, textarea { background:var(--card2); border:1px solid var(--line); border-radius:8px; padding:10px 14px; color:var(--white); font-size:13px; font-family:inherit; outline:none; width:100%; transition:border-color .2s; }
    input:focus, select:focus, textarea:focus { border-color:var(--blue-bright); }
    select option { background:var(--card2); }
    textarea { resize:vertical; min-height:70px; }
    .form-actions { display:flex; gap:10px; margin-top:24px; justify-content:flex-end; }
    .btn-red { background:rgba(232,80,80,.15); color:var(--red); border:1px solid rgba(232,80,80,.3); }
    .btn-red:hover { background:rgba(232,80,80,.25); }

    /* PRIZE EDITOR */
    .prize-editor { display:flex; flex-wrap:wrap; gap:6px; padding:8px; background:var(--card2); border:1px solid var(--line); border-radius:8px; min-height:44px; cursor:text; }
    .prize-editor-chip { display:flex; align-items:center; gap:5px; background:rgba(91,157,255,.12); border:1px solid rgba(91,157,255,.25); border-radius:6px; padding:3px 8px; font-size:12px; }
    .prize-editor-chip.agreed { background:rgba(32,200,112,.1); border-color:rgba(32,200,112,.3); }
    .prize-editor-chip button { background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px; line-height:1; padding:0; }
    .prize-add { display:flex; gap:8px; margin-top:6px; align-items:center; }
    .prize-add input { flex:1; }

    /* EXPORT */
    .export-bar { position:fixed; bottom:0; left:0; right:0; background:rgba(10,26,58,.97); border-top:1px solid var(--line); padding:12px 24px; display:flex; gap:10px; align-items:center; z-index:50; }
    .export-bar span { font-size:12px; color:var(--muted); flex:1; }
  </style>
</head>
<body>

<header>
  <div class="logo">🍪 U Street <span>Passport</span> · Partner Tracker</div>
  <div class="header-actions">
    <button class="btn btn-outline btn-sm" onclick="exportCSV()">⬇ Export CSV</button>
    <button class="btn btn-gold btn-sm" onclick="openModal()">+ Add Partner</button>
  </div>
</header>

<div class="summary" id="summary"></div>

<div class="filters">
  <span class="filter-label">Filter:</span>
  <button class="filter-btn active all" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('confirmed',this)">✓ Confirmed</button>
  <button class="filter-btn" onclick="setFilter('interested',this)">Interested</button>
  <button class="filter-btn" onclick="setFilter('outreach',this)">Outreach</button>
  <button class="filter-btn" onclick="setFilter('pending',this)">Pending</button>
  <button class="filter-btn" onclick="setFilter('declined',this)">Declined</button>
  <div class="search-wrap">
    <input class="search-input" type="text" placeholder="Search partners…" id="search-input" oninput="renderTable()">
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th class="sort" onclick="sortBy('venue')">Venue / Business ↕</th>
        <th>Type</th>
        <th class="sort" onclick="sortBy('contact')">Owner / Contact ↕</th>
        <th>Status</th>
        <th>Prizes Offered</th>
        <th>Prizes Agreed</th>
        <th>Notes</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
  <button class="add-row-btn" onclick="openModal()">+ Add New Partner</button>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h2 id="modal-title">Add Partner</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Business Name *</label>
        <input type="text" id="f-venue" placeholder="e.g. Jeni's Ice Creams">
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="f-type">
          <option value="food">Food & Restaurant</option>
          <option value="bar">Bar / Lounge</option>
          <option value="cannabis">Cannabis</option>
          <option value="venue">Venue</option>
          <option value="sponsor">Sponsor / Brand</option>
          <option value="campus">Campus / HBCU</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Owner / Contact Name</label>
        <input type="text" id="f-contact" placeholder="First Last">
      </div>
      <div class="form-group">
        <label>Role / Title</label>
        <input type="text" id="f-role" placeholder="e.g. Owner, Manager">
      </div>
      <div class="form-group">
        <label>Phone / IG / Email</label>
        <input type="text" id="f-phone" placeholder="@handle, number, or email">
      </div>
      <div class="form-group">
        <label>Address / Location</label>
        <input type="text" id="f-address" placeholder="Street address">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="f-status">
          <option value="pending">Pending</option>
          <option value="outreach">Outreach Sent</option>
          <option value="interested">Interested</option>
          <option value="confirmed">Confirmed</option>
          <option value="declined">Declined</option>
        </select>
      </div>
      <div class="form-group">
        <label>Last Contact Date</label>
        <input type="date" id="f-date">
      </div>
      <div class="form-group full">
        <label>Prizes / Perks Offered (what you asked for)</label>
        <div class="prize-editor" id="offered-editor" onclick="document.getElementById('offered-input').focus()"></div>
        <div class="prize-add">
          <input type="text" id="offered-input" placeholder="Type a prize and press Enter…" onkeydown="addPrize(event,'offered')">
          <button class="btn btn-outline btn-sm" onclick="addPrize({key:'Enter',target:document.getElementById('offered-input')},'offered')">Add</button>
        </div>
      </div>
      <div class="form-group full">
        <label>Prizes / Perks Agreed ✓ (what they committed to)</label>
        <div class="prize-editor" id="agreed-editor" onclick="document.getElementById('agreed-input').focus()"></div>
        <div class="prize-add">
          <input type="text" id="agreed-input" placeholder="Type committed prize and press Enter…" onkeydown="addPrize(event,'agreed')">
          <button class="btn btn-outline btn-sm" onclick="addPrize({key:'Enter',target:document.getElementById('agreed-input')},'agreed')">Add</button>
        </div>
      </div>
      <div class="form-group full">
        <label>Notes</label>
        <textarea id="f-notes" placeholder="Context, conversation history, follow-up needed…"></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-red btn-sm" id="delete-btn" onclick="deletePartner()" style="display:none">Delete</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-gold" onclick="savePartner()">Save Partner</button>
    </div>
  </div>
</div>

<div class="export-bar">
  <span id="status-line">Loading…</span>
  <button class="btn btn-outline btn-sm" onclick="exportCSV()">⬇ Export CSV</button>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'usp_partners_v2';
let partners = [];
let editingId = null;
let currentFilter = 'all';
let sortField = null;
let sortDir = 1;
let offeredPrizes = [];
let agreedPrizes = [];

// Seed data — pre-loaded known partners
const SEED = [
  { id: uid(), venue: "Cookies DC", type: "cannabis", contact: "Deuce", role: "Co-Founder / Host", phone: "", address: "U Street NW, Washington DC", status: "confirmed", date: "2026-06-15", offered: ["HQ anchor", "Merch prizes", "Space for finale"], agreed: ["HQ anchor", "Merch prizes"], notes: "Anchor partner. 1-year anniversary event. Co-producer Deuce." },
  { id: uid(), venue: "Jeni's Ice Creams", type: "food", contact: "", role: "Manager", phone: "", address: "1781 Florida Ave NW", status: "confirmed", date: "", offered: ["Free scoop for players"], agreed: ["Free scoop for players"], notes: "On the wheel. Perk confirmed." },
  { id: uid(), venue: "Chicken Rico", type: "food", contact: "", role: "", phone: "", address: "U St Corridor", status: "outreach", date: "", offered: ["Free side with purchase"], agreed: [], notes: "" },
  { id: uid(), venue: "Nellie's Sports Bar", type: "bar", contact: "", role: "", phone: "", address: "900 U St NW", status: "outreach", date: "", offered: ["Free entry before 10pm"], agreed: [], notes: "" },
  { id: uid(), venue: "1942 Lounge / District Sports Bar", type: "bar", contact: "", role: "", phone: "", address: "U St Corridor", status: "pending", date: "", offered: ["Drink special for players"], agreed: [], notes: "" },
  { id: uid(), venue: "Tipsy Hookah Lounge", type: "bar", contact: "", role: "", phone: "", address: "U St Corridor", status: "confirmed", date: "", offered: ["Free tea"], agreed: ["Free tea"], notes: "On the spin wheel." },
  { id: uid(), venue: "Oohs & Ahhs", type: "food", contact: "", role: "", phone: "", address: "1005 U St NW", status: "confirmed", date: "", offered: ["Free dessert"], agreed: ["Free dessert"], notes: "On the spin wheel." },
  { id: uid(), venue: "Spicy Water", type: "food", contact: "", role: "", phone: "", address: "U St Corridor", status: "confirmed", date: "", offered: ["Free drink"], agreed: ["Free drink"], notes: "On the spin wheel." },
  { id: uid(), venue: "Ben's Next Door", type: "food", contact: "", role: "", phone: "", address: "1211 U St NW", status: "confirmed", date: "", offered: ["Free chili dog"], agreed: ["Free chili dog"], notes: "On the spin wheel." },
  { id: uid(), venue: "Chi-Cha Lounge", type: "venue", contact: "", role: "", phone: "", address: "1624 U St NW", status: "confirmed", date: "", offered: ["After party venue 10pm+"], agreed: ["After party venue"], notes: "After party destination post-event." },
  { id: uid(), venue: "Haven (H St DC)", type: "venue", contact: "", role: "", phone: "", address: "H St NE, Washington DC", status: "interested", date: "2026-05-01", offered: [], agreed: [], notes: "Stake at Haven. Industry validator. Endorsed concept, suggested Michelin-style rating + artist booking direction." },
  { id: uid(), venue: "Howard University", type: "campus", contact: "", role: "Student Activities", phone: "", address: "2400 Sixth St NW", status: "pending", date: "", offered: ["Campus Blunt Factz activation", "Campus prize giveaway"], agreed: [], notes: "Target for pre-event recruitment week. Need student org contact." },
];

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try { partners = JSON.parse(raw); }
    catch { partners = [...SEED]; save(); }
    // Always merge seed partners — ensures key rows (Cookies DC, etc.) are never missing
    let changed = false;
    SEED.forEach(seed => {
      const already = partners.find(p => p.venue.toLowerCase() === seed.venue.toLowerCase());
      if (!already) {
        partners.push({...seed});
        changed = true;
      }
    });
    if (changed) save();
  } else {
    partners = [...SEED];
    save();
  }
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(partners)); }

// ── RENDER ────────────────────────────────────────────────────────────────────
const STATUS_LABELS = { confirmed:'Confirmed', interested:'Interested', outreach:'Outreach', pending:'Pending', declined:'Declined' };
const TYPE_LABELS = { venue:'Venue', food:'Food', cannabis:'Cannabis', bar:'Bar/Lounge', sponsor:'Sponsor', campus:'Campus', other:'Other' };

function renderSummary() {
  const total = partners.length;
  const confirmed = partners.filter(p=>p.status==='confirmed').length;
  const agreedCount = partners.filter(p=>p.agreed&&p.agreed.length>0).length;
  const pending = partners.filter(p=>p.status==='pending'||p.status==='outreach').length;
  document.getElementById('summary').innerHTML = `
    <div class="sum-card blue"><div class="sum-num">${total}</div><div class="sum-lbl">Total Partners</div></div>
    <div class="sum-card green"><div class="sum-num">${confirmed}</div><div class="sum-lbl">Confirmed</div></div>
    <div class="sum-card gold"><div class="sum-num">${agreedCount}</div><div class="sum-lbl">Prizes Locked</div></div>
    <div class="sum-card red"><div class="sum-num">${pending}</div><div class="sum-lbl">Needs Follow-up</div></div>
  `;
  document.getElementById('status-line').textContent = `${confirmed} confirmed · ${agreedCount} prizes locked · ${pending} need follow-up`;
}

function renderTable() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let filtered = partners.filter(p => {
    if (currentFilter !== 'all' && p.status !== currentFilter) return false;
    if (q) {
      const hay = [p.venue, p.contact, p.role, p.notes, p.address, ...(p.offered||[]), ...(p.agreed||[])].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  if (sortField) {
    filtered.sort((a,b) => {
      const av = (a[sortField]||'').toLowerCase();
      const bv = (b[sortField]||'').toLowerCase();
      return av < bv ? -sortDir : av > bv ? sortDir : 0;
    });
  }

  const tbody = document.getElementById('table-body');
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="8" class="empty">No partners found.</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(p => `
    <tr>
      <td>
        <div style="font-weight:700;color:var(--white)">${esc(p.venue)}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${esc(p.address)}</div>
      </td>
      <td><span class="type-badge ${p.type}">${TYPE_LABELS[p.type]||p.type}</span></td>
      <td>
        <div class="contact-name">${esc(p.contact)||'—'}</div>
        <div class="contact-role">${esc(p.role)}</div>
        ${p.phone ? `<div class="contact-links"><a href="tel:${esc(p.phone)}">${esc(p.phone)}</a></div>` : ''}
      </td>
      <td><span class="badge ${p.status}">${STATUS_LABELS[p.status]||p.status}</span></td>
      <td>
        <div class="prize-list">
          ${(p.offered||[]).map(pr=>`<span class="prize-chip">${esc(pr)}</span>`).join('')||'<span style="color:var(--muted);font-size:12px">None</span>'}
        </div>
      </td>
      <td>
        <div class="prize-list">
          ${(p.agreed||[]).map(pr=>`<span class="prize-chip agreed">✓ ${esc(pr)}</span>`).join('')||'<span style="color:var(--muted);font-size:12px">—</span>'}
        </div>
      </td>
      <td><div class="note-text">${esc(p.notes)}</div></td>
      <td>
        <div class="action-row">
          <button class="action-btn" onclick="openModal('${p.id}')">Edit</button>
          <button class="action-btn" onclick="cycleStatus('${p.id}')">Status</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function render() { renderSummary(); renderTable(); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── FILTERS / SORT ────────────────────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function sortBy(field) {
  if (sortField === field) sortDir *= -1;
  else { sortField = field; sortDir = 1; }
  renderTable();
}

// ── STATUS CYCLE ──────────────────────────────────────────────────────────────
const STATUS_CYCLE = ['pending','outreach','interested','confirmed','declined'];
function cycleStatus(id) {
  const p = partners.find(x=>x.id===id);
  if (!p) return;
  const i = STATUS_CYCLE.indexOf(p.status);
  p.status = STATUS_CYCLE[(i+1)%STATUS_CYCLE.length];
  save(); render();
}

// ── PRIZES ────────────────────────────────────────────────────────────────────
function renderPrizeEditor(type) {
  const prizes = type==='offered' ? offeredPrizes : agreedPrizes;
  const el = document.getElementById(type+'-editor');
  el.querySelectorAll('.prize-editor-chip').forEach(c=>c.remove());
  prizes.forEach((pr,i)=>{
    const chip = document.createElement('span');
    chip.className = 'prize-editor-chip' + (type==='agreed'?' agreed':'');
    chip.innerHTML = `${esc(pr)} <button onclick="removePrize('${type}',${i})">&times;</button>`;
    el.insertBefore(chip, el.querySelector('input'));
  });
}

function addPrize(e, type) {
  if (e.key !== 'Enter') return;
  const inp = e.target || document.getElementById(type+'-input');
  const val = inp.value.trim();
  if (!val) return;
  if (type==='offered') offeredPrizes.push(val);
  else agreedPrizes.push(val);
  inp.value = '';
  renderPrizeEditor(type);
}

function removePrize(type, i) {
  if (type==='offered') offeredPrizes.splice(i,1);
  else agreedPrizes.splice(i,1);
  renderPrizeEditor(type);
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(id) {
  editingId = id || null;
  offeredPrizes = [];
  agreedPrizes = [];
  const modal = document.getElementById('modal');
  const deleteBtn = document.getElementById('delete-btn');

  if (id) {
    const p = partners.find(x=>x.id===id);
    if (!p) return;
    document.getElementById('modal-title').textContent = 'Edit Partner';
    document.getElementById('f-venue').value = p.venue||'';
    document.getElementById('f-type').value = p.type||'food';
    document.getElementById('f-contact').value = p.contact||'';
    document.getElementById('f-role').value = p.role||'';
    document.getElementById('f-phone').value = p.phone||'';
    document.getElementById('f-address').value = p.address||'';
    document.getElementById('f-status').value = p.status||'pending';
    document.getElementById('f-date').value = p.date||'';
    document.getElementById('f-notes').value = p.notes||'';
    offeredPrizes = [...(p.offered||[])];
    agreedPrizes = [...(p.agreed||[])];
    deleteBtn.style.display = 'block';
  } else {
    document.getElementById('modal-title').textContent = 'Add Partner';
    ['f-venue','f-contact','f-role','f-phone','f-address','f-notes'].forEach(f=>document.getElementById(f).value='');
    document.getElementById('f-type').value='food';
    document.getElementById('f-status').value='pending';
    document.getElementById('f-date').value='';
    deleteBtn.style.display='none';
  }

  renderPrizeEditor('offered');
  renderPrizeEditor('agreed');
  modal.classList.add('open');
  document.getElementById('f-venue').focus();
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function savePartner() {
  const venue = document.getElementById('f-venue').value.trim();
  if (!venue) { alert('Business name is required.'); return; }

  const data = {
    venue, type: document.getElementById('f-type').value,
    contact: document.getElementById('f-contact').value.trim(),
    role: document.getElementById('f-role').value.trim(),
    phone: document.getElementById('f-phone').value.trim(),
    address: document.getElementById('f-address').value.trim(),
    status: document.getElementById('f-status').value,
    date: document.getElementById('f-date').value,
    notes: document.getElementById('f-notes').value.trim(),
    offered: [...offeredPrizes],
    agreed: [...agreedPrizes],
  };

  if (editingId) {
    const i = partners.findIndex(p=>p.id===editingId);
    if (i > -1) partners[i] = { ...partners[i], ...data };
  } else {
    partners.push({ id: uid(), ...data });
  }

  save(); closeModal(); render();
}

function deletePartner() {
  if (!editingId) return;
  if (!confirm('Delete this partner?')) return;
  partners = partners.filter(p=>p.id!==editingId);
  save(); closeModal(); render();
}

// ── EXPORT CSV ────────────────────────────────────────────────────────────────
function exportCSV() {
  const cols = ['Venue','Type','Contact','Role','Phone','Address','Status','Last Contact','Prizes Offered','Prizes Agreed','Notes'];
  const rows = partners.map(p=>[
    p.venue, p.type, p.contact, p.role, p.phone, p.address, p.status, p.date,
    (p.offered||[]).join(' | '), (p.agreed||[]).join(' | '), p.notes
  ]);
  const csv = [cols, ...rows].map(r=>r.map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = 'usp-partners.csv';
  a.click();
}

// ── CLOSE ON BG CLICK ─────────────────────────────────────────────────────────
document.getElementById('modal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

// ── INIT ──────────────────────────────────────────────────────────────────────
load();
render();
</script>
</body>
</html>
